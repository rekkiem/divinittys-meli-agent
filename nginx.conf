# nginx.conf — Proxy reverso para Divinittys Meli Agent
# Habilita HTTPS (requerido para que ML acepte el webhook endpoint)

server {
    listen 80;
    server_name tu-dominio.com;

    # Redirigir todo HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Certbot challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name tu-dominio.com;

    # ── SSL (Let's Encrypt) ────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Seguridad básica ───────────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # ── Proxy al agente FastAPI ────────────────────────────────────────────────
    location / {
        proxy_pass         http://agente:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout generoso para webhooks
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Proteger rutas de admin ────────────────────────────────────────────────
    # Descomenta y reemplaza con tu IP real para asegurar los endpoints /admin/
    # location /admin/ {
    #     allow 200.0.0.1;   # Tu IP real
    #     deny  all;
    #     proxy_pass http://agente:8000;
    # }
}
