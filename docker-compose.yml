version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Divinittys Meli Agent — Docker Compose
# Servicios: agente FastAPI + PostgreSQL (producción)
#
# Uso rápido (desarrollo con SQLite):
#   docker compose up agente
#
# Producción con PostgreSQL:
#   docker compose --profile prod up -d
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Agente Principal ───────────────────────────────────────────────────────
  agente:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: divinittys-meli-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ML Credentials
      - MELI_CLIENT_ID=${MELI_CLIENT_ID}
      - MELI_CLIENT_SECRET=${MELI_CLIENT_SECRET}
      - MELI_REDIRECT_URI=${MELI_REDIRECT_URI}
      - MELI_WEBHOOK_SECRET=${MELI_WEBHOOK_SECRET}
      # DB (SQLite dev / PostgreSQL prod)
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/divinittys_agent.db}
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Datos bancarios
      - BANK_NAME=${BANK_NAME}
      - BANK_ACCOUNT_TYPE=${BANK_ACCOUNT_TYPE}
      - BANK_ACCOUNT_NUMBER=${BANK_ACCOUNT_NUMBER}
      - BANK_RUT=${BANK_RUT}
      - BANK_OWNER=${BANK_OWNER}
      - BANK_EMAIL=${BANK_EMAIL}
      - SHIPPING_COST=${SHIPPING_COST:-4000}
      # Config
      - POLLING_INTERVAL_MINUTES=${POLLING_INTERVAL_MINUTES:-5}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      # Persistir DB SQLite entre reinicios (solo para desarrollo)
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - meli_net

  # ── PostgreSQL (solo producción) ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: divinittys-postgres
    profiles: ["prod"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: divinittys
      POSTGRES_USER: divinittys
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - meli_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U divinittys"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx (proxy reverso con SSL — producción) ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: divinittys-nginx
    profiles: ["prod"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro          # Certificados Let's Encrypt
    depends_on:
      - agente
    networks:
      - meli_net

volumes:
  postgres_data:

networks:
  meli_net:
    driver: bridge
