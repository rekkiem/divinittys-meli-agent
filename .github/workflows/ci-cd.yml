name: CI/CD — Divinittys Meli Agent

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/divinittys-meli-agent
  PYTHON_VERSION: "3.11"

jobs:
  # ── JOB 1: Tests ────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias de test
        run: pip install -r requirements-test.txt

      - name: Crear .env de prueba
        run: |
          cat > .env << 'EOF'
          MELI_CLIENT_ID=test_client_id
          MELI_CLIENT_SECRET=test_secret
          MELI_REDIRECT_URI=http://localhost:8000/auth/callback
          DATABASE_URL=sqlite+aiosqlite:///./test_agent.db
          ADMIN_USERNAME=divinittys
          ADMIN_PASSWORD=test_password_ci_123
          ADMIN_ALLOWED_IPS=
          BANK_NAME=Banco Test
          BANK_ACCOUNT_TYPE=Cuenta Corriente
          BANK_ACCOUNT_NUMBER=000000000
          BANK_RUT=11.111.111-1
          BANK_OWNER=Test Owner
          BANK_EMAIL=test@test.com
          SHIPPING_COST=4000
          TELEGRAM_BOT_TOKEN=
          TELEGRAM_CHAT_ID=
          POLLING_INTERVAL_MINUTES=5
          POLLING_LOOKBACK_HOURS=2
          ENVIRONMENT=development
          DEBUG=false
          EOF

      - name: Ejecutar tests con cobertura
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=65

      - name: Subir reporte de cobertura
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── JOB 2: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar herramientas de lint
        run: pip install ruff

      - name: Ruff check
        run: ruff check app/ --select=E,W,F,I --ignore=E501

  # ── JOB 3: Docker Build ─────────────────────────────────────────────────────
  build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build y push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── JOB 4: Deploy ───────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy a Producción
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy vía SSH al VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/divinittys-meli-agent
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:latest
            if [ -f data/divinittys_agent.db ]; then
              cp data/divinittys_agent.db data/divinittys_agent.db.bak
            fi
            docker compose pull agente
            docker compose up -d --no-deps agente
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8000/health > /dev/null; then
                echo "✅ Deploy exitoso"
                break
              fi
              sleep 3
            done
            docker compose exec -T agente alembic upgrade head || true
            docker image prune -f

      - name: Notificar resultado
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON="✅"
          if [ "$STATUS" != "success" ]; then ICON="❌"; fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${ICON} Deploy ${STATUS} — Divinittys Agent" \
            -d "parse_mode=Markdown" || true
